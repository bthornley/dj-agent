name: QA Agent — Build Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  code-review:
    name: 🤖 Code Review Agent
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Code Review Agent
        id: run-reviewer
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set +e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            export BRANCH="${{ github.head_ref }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
            export BRANCH="${GITHUB_REF_NAME}"
          fi
          
          if [ "$BASE" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE" ]; then
            BASE="origin/main"
          fi
          
          echo "Running code review relative to base $BASE and head $HEAD..."
          OUTPUT=$(npx tsx scripts/code-reviewer.ts "$BASE" "$HEAD")
          EXIT_CODE=$?
          
          echo "REVIEW_OUTPUT<<EOF" >> $GITHUB_ENV
          echo "$OUTPUT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          if [ $EXIT_CODE -ne 0 ]; then
             echo "Code Review failed!"
             echo "## ❌ Code Review Agent - Failed" >> $GITHUB_STEP_SUMMARY
             echo '```json' >> $GITHUB_STEP_SUMMARY
             echo "$OUTPUT" >> $GITHUB_STEP_SUMMARY
             echo '```' >> $GITHUB_STEP_SUMMARY
             exit 1
          else
             echo "Code Review passed!"
             echo "## ✅ Code Review Agent - Passed" >> $GITHUB_STEP_SUMMARY
             exit 0
          fi

      - name: Post Comment on PR
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const reviewOutput = process.env.REVIEW_OUTPUT;
            try {
              const result = JSON.parse(reviewOutput);
              let body = '## ⚠️ Automated Code Review Failed\n\n';
              body += `> ${result.summary}\n\n`;
              body += '| File | Rule Violated | Issue | Suggestion |\n';
              body += '|---|---|---|---|\n';
              for (const v of result.violations) {
                 body += `| \`${v.file}:${v.line}\` | **${v.rule}** | ${v.issue} | ${v.suggestion} |\n`;
              }
              body += '\n\n*The Remediation Agent is now attempting to automatically fix these issues.*';
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } catch(e) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: "## ❌ Automated Code Review Crashed\n\nThe Code Review Agent crashed while analyzing the diff."
              });
            }

      - name: Trigger Remediation Agent
        if: failure()
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Starting Remediation Agent..."
          echo "DEBUG REVIEW_OUTPUT: ${REVIEW_OUTPUT}"
          npx tsx scripts/remediation-agent.ts "${REVIEW_OUTPUT}" || exit 1
          
          # Check if there are modified files to commit
          if [[ -n $(git status -s) ]]; then
            echo "Changes detected, pushing commit..."
            git config --global user.name "GigLift Remediation Agent"
            git config --global user.email "bot@giglift.com"
            git add .
            git commit -m "🤖 auto-fix: resolved QA agent violations"
            
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              git push origin HEAD:${{ github.head_ref }}
            else
              git push origin HEAD:${GITHUB_REF_NAME}
            fi
            
            echo "## 🛠️ Remediation Agent - Fixes pushed successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "No changes were made by the Remediation Agent."
            echo "## ⚠️ Remediation Agent - Failed to patch files" >> $GITHUB_STEP_SUMMARY
            exit 1 # Fail the build so the user knows they have to fix it manually
          fi

  qa-agent:
    name: 🛡️ QA Agent
    needs: code-review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: 'Production – dj-agent'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Gate 1: TypeScript Compilation ──────────────────
      - name: '🔍 Gate 1: TypeScript — zero errors'
        run: npx tsc --noEmit

      # ── Gate 2: ESLint ─────────────────────────────────
      - name: '🔍 Gate 2: ESLint — code quality'
        run: npm run lint

      # ── Gate 3: Next.js Production Build ───────────────
      - name: '🔍 Gate 3: Production build — no build errors'
        run: npm run build
        env:
          # Use real Clerk keys from GitHub Secrets (Clerk validates key format at build time)
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          OPENAI_API_KEY: sk-dummy
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}

      # ── Gate 4: Route Integrity ────────────────────────
      - name: '🔍 Gate 4: Route integrity — all API routes valid'
        run: |
          echo "Checking API route structure..."
          ROUTES=$(find src/app/api -name 'route.ts' | wc -l | tr -d ' ')
          echo "Found $ROUTES API routes"

          # Verify no route files with syntax issues (caught by tsc, but double-check)
          if [ "$ROUTES" -eq 0 ]; then
            echo "❌ No API routes found — something is wrong"
            exit 1
          fi

          # Check that all agent routes exist in vercel.json cron config
          CRON_AGENTS=$(grep -o '/api/agents/[a-z-]*' vercel.json | sort)
          AGENT_ROUTES=$(find src/app/api/agents -name 'route.ts' -exec dirname {} \; | sed 's|src/app||' | sort)
          
          echo "Cron-configured agents:"
          echo "$CRON_AGENTS"
          echo ""
          echo "Available agent routes:"
          echo "$AGENT_ROUTES"

          # Verify all cron paths have a corresponding route
          while IFS= read -r cron_path; do
            route_dir="src/app${cron_path}"
            if [ ! -f "${route_dir}/route.ts" ]; then
              echo "❌ Cron path ${cron_path} has no route.ts"
              exit 1
            fi
          done <<< "$CRON_AGENTS"
          echo "✅ All cron agents have valid routes"

      # ── Gate 5: Security Checks ────────────────────────
      - name: '🔍 Gate 5: Security — no leaked secrets'
        run: |
          echo "Scanning for hardcoded secrets..."
          # Check for common secret patterns (skip .env files, node_modules, .git)
          LEAKS=$(grep -rn --include='*.ts' --include='*.tsx' --include='*.js' \
            -E '(sk_live_|sk_test_[A-Za-z0-9]{20,}|AKIA[A-Z0-9]{16}|password\s*=\s*["\x27][^\x27"]{8,})' \
            src/ || true)
          
          if [ -n "$LEAKS" ]; then
            echo "⚠️ Potential secret leak detected:"
            echo "$LEAKS"
            echo ""
            echo "❌ Remove hardcoded secrets and use environment variables"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"

      # ── Gate 6: Bundle Size Check ──────────────────────
      - name: '🔍 Gate 6: Bundle size — no bloat'
        run: |
          # Check .next output size
          if [ -d ".next" ]; then
            SIZE=$(du -sm .next | cut -f1)
            echo "Build output size: ${SIZE}MB"
            if [ "$SIZE" -gt 500 ]; then
              echo "⚠️ Build output is ${SIZE}MB — exceeds 500MB threshold"
              echo "Consider code splitting or removing unused dependencies"
              exit 1
            fi
            echo "✅ Bundle size OK (${SIZE}MB)"
          fi

      # ── Summary ────────────────────────────────────────
      - name: '✅ QA Agent — All gates passed'
        if: success()
        run: |
          echo "══════════════════════════════════════════"
          echo "  🛡️ QA Agent: ALL GATES PASSED"
          echo "  Build is approved for production deploy"
          echo "══════════════════════════════════════════"

      - name: '❌ QA Agent — Gates failed'
        if: failure()
        run: |
          echo "══════════════════════════════════════════"
          echo "  🚨 QA Agent: BUILD REJECTED"
          echo "  Fix the issues above before deploying"
          echo "══════════════════════════════════════════"
